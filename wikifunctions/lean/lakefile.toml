name = "wikifunctions"
defaultTargets = ["Wikifunctions"]

# Pinned to an upstream leanprover-community/mathlib4 commit (Lean v4.32.0-rc1),
# NOT the local bot-managed mathlib4 checkout — so the bot's branch/toolchain
# churn can't break this project. Bump `rev` (and lean-toolchain to match) to
# move; `lake exe cache get` pulls prebuilt oleans for the pinned commit.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "6eb4a1ce07e071ac0f8365e6999a3135b45d8ae4"

[[lean_lib]]
name = "Wikifunctions"

# Native executable for the differential test (Mathlib-free: imports only
# Wikifunctions.Python.Z13701Prog). Compiled so it runs fast even under heavy
# system load, unlike interpreted `lean --run`.
[[lean_exe]]
name = "diffdriver"
root = "DiffDriver"
